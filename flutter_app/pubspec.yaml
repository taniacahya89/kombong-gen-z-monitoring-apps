name: kombong_genz
description: IoT Monitoring System - Pengabdian Masyarakat (Kombong GenZ)

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.0.0

  # State Management
  flutter_riverpod: ^2.5.1

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  firebase_database: ^11.1.4
  cloud_firestore: ^5.4.4

  # UI Components
  fl_chart: ^0.68.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1

  # Font (Google Fonts)
  google_fonts: ^6.2.1

  # Utilities
  intl: ^0.19.0
  equatable: ^2.0.5
  json_annotation: ^4.9.0

  # Local Push Notification
  flutter_local_notifications: ^17.0.0
  mqtt_client: ^10.11.11
  timezone: ^0.9.4
  flutter_timezone: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  json_serializable: ^6.8.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/images/app_icon.png"
  remove_alpha_ios: true